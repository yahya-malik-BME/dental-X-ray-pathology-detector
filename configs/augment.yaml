# Albumentations augmentation pipeline
# Medical imaging specific — conservative augmentations only
# Do NOT use augmentations that change clinical appearance

augmentation:
  # Applied to training set only
  train:
    - name: "HorizontalFlip"
      p: 0.5

    # Brightness/contrast — simulate different X-ray exposure settings
    - name: "RandomBrightnessContrast"
      brightness_limit: 0.2
      contrast_limit: 0.2
      p: 0.7

    # Gamma correction — simulate different detector responses
    - name: "RandomGamma"
      gamma_limit: [80, 120]
      p: 0.5

    # Gaussian noise — simulate detector noise
    - name: "GaussNoise"
      var_limit: [10, 50]
      p: 0.3

    # Slight rotation — small angle only (not clinically realistic to flip teeth 90°)
    - name: "Rotate"
      limit: 10
      border_mode: 0            # cv2.BORDER_CONSTANT
      p: 0.4

    # CLAHE — contrast limited adaptive histogram equalization
    # Very important for X-rays — improves visibility of bone/tissue
    - name: "CLAHE"
      clip_limit: 4.0
      tile_grid_size: [8, 8]
      p: 0.5

    # Slight blur — simulate motion / focus variation
    - name: "Blur"
      blur_limit: 3
      p: 0.2

    # Elastic transform — slight deformation (teeth do move slightly)
    - name: "ElasticTransform"
      alpha: 1
      sigma: 50
      alpha_affine: 50
      p: 0.2

  # Applied to val/test sets — normalization only
  val:
    - name: "Normalize"
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

  # Always applied (both train and val)
  always:
    - name: "Resize"
      height: 640
      width: 640

    - name: "ToTensorV2"
